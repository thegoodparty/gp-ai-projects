name: Build and Deploy Meeting Pipeline

on:
  push:
    branches:
      - develop
      - qa
      - prod
    paths:
      - 'meeting_pipeline/**'
      - 'shared/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/build-meeting-pipeline.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy (dev/qa/prod)'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - qa
          - prod

env:
  AWS_REGION: us-west-2
  ECR_REPOSITORY: gp-ai-projects

jobs:
  build-and-deploy:
    name: Build Image and Update Lambdas
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      - name: Determine environment and tag
        id: env
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            ENV="${{ github.event.inputs.environment }}"
          elif [[ "${{ github.ref }}" == "refs/heads/prod" ]]; then
            ENV="prod"
          elif [[ "${{ github.ref }}" == "refs/heads/qa" ]]; then
            ENV="qa"
          elif [[ "${{ github.ref }}" == "refs/heads/develop" ]]; then
            ENV="dev"
          else
            echo "ERROR: Workflow triggered from unexpected branch: ${{ github.ref }}"
            exit 1
          fi

          TAG="meeting-pipeline-${ENV}"
          DISCOVER_TAG="meeting-pipeline-discover-${ENV}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "discover_tag=${DISCOVER_TAG}" >> $GITHUB_OUTPUT
          echo "environment=${ENV}" >> $GITHUB_OUTPUT
          echo "Building for environment: ${ENV} with tags: ${TAG}, ${DISCOVER_TAG}"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::333022194791:role/github-actions-ecr-push
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Lambda Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./meeting_pipeline/Dockerfile.lambda
          platforms: linux/arm64
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.env.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Build and push discover (Fargate) Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./meeting_pipeline/Dockerfile.discover
          platforms: linux/arm64
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.env.outputs.discover_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Update Lambda functions
        run: |
          IMAGE="${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.env.outputs.tag }}"
          ENV="${{ steps.env.outputs.environment }}"

          for STAGE in scan process; do
            echo "Updating meeting-pipeline-${STAGE}-${ENV}..."
            aws lambda update-function-code \
              --function-name "meeting-pipeline-${STAGE}-${ENV}" \
              --image-uri "${IMAGE}" \
              --region ${{ env.AWS_REGION }}
          done

      - name: Wait for Lambda functions to stabilize
        run: |
          ENV="${{ steps.env.outputs.environment }}"

          for STAGE in scan process; do
            FUNC="meeting-pipeline-${STAGE}-${ENV}"
            echo "Waiting for ${FUNC} to stabilize..."
            aws lambda wait function-updated \
              --function-name "${FUNC}" \
              --region ${{ env.AWS_REGION }}
            echo "${FUNC} is ready."
          done

          echo "All Lambda functions updated successfully."
