name: Build and Deploy Meeting QA

on:
  push:
    branches:
      - develop
      - qa
      - prod
    paths:
      - 'meeting_qa/**'
      - 'shared/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/build-meeting-qa.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy (dev/qa/prod)'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - qa
          - prod

env:
  AWS_REGION: us-west-2
  ECR_REPOSITORY: gp-ai-projects

jobs:
  build-and-deploy:
    name: Build Image and Update QA Lambda
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      - name: Determine environment and tag
        id: env
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            ENV="${{ github.event.inputs.environment }}"
          elif [[ "${{ github.ref }}" == "refs/heads/prod" ]]; then
            ENV="prod"
          elif [[ "${{ github.ref }}" == "refs/heads/qa" ]]; then
            ENV="qa"
          elif [[ "${{ github.ref }}" == "refs/heads/develop" ]]; then
            ENV="dev"
          else
            echo "ERROR: Workflow triggered from unexpected branch: ${{ github.ref }}"
            exit 1
          fi

          TAG="meeting-qa-${ENV}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "environment=${ENV}" >> $GITHUB_OUTPUT
          echo "Building for environment: ${ENV} with tag: ${TAG}"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::333022194791:role/github-actions-ecr-push
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./meeting_qa/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.env.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Update QA Lambda function
        run: |
          IMAGE="${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.env.outputs.tag }}"
          ENV="${{ steps.env.outputs.environment }}"
          FUNC="meeting-qa-${ENV}"

          echo "Updating ${FUNC}..."
          aws lambda update-function-code \
            --function-name "${FUNC}" \
            --image-uri "${IMAGE}" \
            --region ${{ env.AWS_REGION }}

      - name: Wait for QA Lambda to stabilize
        run: |
          ENV="${{ steps.env.outputs.environment }}"
          FUNC="meeting-qa-${ENV}"
          echo "Waiting for ${FUNC} to stabilize..."
          aws lambda wait function-updated \
            --function-name "${FUNC}" \
            --region ${{ env.AWS_REGION }}
          echo "${FUNC} is ready."
