[mypy]
python_version = 3.11

# Strict mode (use gradually)
# strict = True

# Individual strict flags (enable incrementally)
warn_return_any = True
warn_unused_configs = True
warn_redundant_casts = True
warn_unused_ignores = True
warn_no_return = True
warn_unreachable = True

# Stricter checking
check_untyped_defs = True
disallow_untyped_calls = False  # Enable later
disallow_untyped_defs = False   # Enable later
disallow_incomplete_defs = False # Enable later

# None/Optional strictness
no_implicit_optional = True
strict_optional = True

# Error on Any
# disallow_any_generics = True  # Enable later
# disallow_subclassing_any = True  # Enable later

# Ignore third-party libraries without stubs
ignore_missing_imports = True

# Per-module overrides (gradually tighten)
[mypy-serve.v1_pipeline.models.*]
disallow_untyped_defs = True

[mypy-serve.v1_pipeline.pipeline.sqs_publisher]
disallow_untyped_defs = True

[mypy-serve.v1_pipeline.pipeline.orchestrator]
# Tighten gradually
disallow_incomplete_defs = True
