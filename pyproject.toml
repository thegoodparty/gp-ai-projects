[project]
name = "gp-ai-projects"
version = "0.1.0"
description = "AI projects at goodparty"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "python-dotenv>=1.1.1",
    "pydantic>=2.0.0",
    "tavily-python>=0.7.8",
    "openai>=1.93.1",
    "fastapi>=0.116.0",
    "uvicorn>=0.35.0",
    "reportlab>=4.4.2",
    "jinja2>=3.1.6",
    "python-multipart>=0.0.20",
    "google-genai>=1.24.0",
]

[project.optional-dependencies]
dev = [
    "ruff>=0.6.0",
    "mypy>=1.7.0",
    "pytest>=7.4.0",
    "pytest-cov>=4.1.0",
    "pre-commit>=3.5.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["ai_generated_campaign_plan", "shared"]

[tool.ruff]
line-length = 88
target-version = "py313"  # set to your actual version from .python-version
exclude = ["*.venv*", ".venv", "build", "dist"]
lint.select = ["E","F","W","I","B","C4","T20","UP","N","ANN","ARG","PL","RUF"]
lint.ignore = ["ANN101","ANN102"]  # allow missing self/cls annotations if desired

[tool.ruff.lint.per-file-ignores]
"tests/**.py" = ["D"]
"shared/llm_gemini.py" = ["T201"]  # Demo/example files can use print statements
"shared/llm.py" = ["T201"]        # Demo/example files can use print statements
"test_*.py" = ["T201", "ANN201"]   # Test files don't need full annotations during development

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.mypy]
python_version = "3.13"  # set to match your project
strict = false
warn_unused_ignores = true
warn_redundant_casts = true
disallow_incomplete_defs = true
no_implicit_optional = true
plugins = []

[tool.pytest.ini_options]
addopts = "-q -ra --strict-markers"
testpaths = ["tests"]

[tool.coverage.run]
branch = true
source = ["ai_generated_campaign_plan", "shared", "api_wrapper.py"]

[tool.coverage.report]
show_missing = true
skip_covered = true
